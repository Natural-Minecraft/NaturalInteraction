# NaturalInteraction v2 Configuration

settings:
  debug: false

interaction:
  default-range: 3.0
  cooldown: 1.0

# Prologue system configuration
prologue:
  interaction-id: "prologue"
  npc-id: 69
  world: "story_sky"
  npc-hologram-default: "§8§l????"
  npc-hologram-exclamation: "§b§l!"

  # Koordinat langit tempat pemain muncul (start cinematic)
  sky-spawn:
    x: 0.0
    y: 226.0
    z: 0.0
    yaw: 0.0
    pitch: 30.0

  cinematic:
    # Custom font character dari resource pack — gambar Title Screen kamu
    # (teks sudah ada di dalam gambar, tidak butuh subtitle)
    title-char: "\uE000"
    # Total blok jarak melayang turun (ketinggian 30 blok)
    float-down-blocks: 30
    # Kecepatan turun (blok per tick) — lebih kecil = lebih lambat
    float-down-speed: 0.04
    # Particle saat melayang turun (Bukkit Particle name)
    float-particle: "TOTEM_OF_UNDYING"

# Plugin command integration
plugins:
  multiverse-teleport-command: "mvtp"
  sudo-command: "sudo"

# Web Panel — https://story.naturalsmp.net
webpanel:
  enabled: true
  port: 25809
  # URL publik (untuk /ni connect dan CORS)
  public-url: "https://story.naturalsmp.net"
  # Token expire dalam detik (default 8 jam)
  token-expire-seconds: 28800

# MySQL — hanya perlu dikonfigurasi di sini, web panel pakai API dari plugin
mysql:
  enabled: false
  host: "103.93.129.117"
  port: 3306
  database: "naturalsmp_interaction"
  username: "root"
  password: "changeme"
  # HikariCP pool settings
  pool-size: 5
  connection-timeout: 30000
