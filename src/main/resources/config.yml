# NaturalInteraction v2 Configuration

settings:
  debug: false

interaction:
  default-range: 3.0
  cooldown: 1.0

# Prologue system configuration
prologue:
  interaction-id: "prologue"
  npc-id: 69
  world: "story_sky"
  npc-hologram-default: "§8§l????"
  npc-hologram-exclamation: "§b§l!"

# Plugin command integration
plugins:
  multiverse-teleport-command: "mvtp"
  sudo-command: "sudo"

# Web Panel (Phase 5) — set enabled: true setelah server disetup
webpanel:
  enabled: false
  port: 8585
  token-expire-seconds: 300
