# NaturalInteraction v2 Configuration

settings:
  debug: false

interaction:
  default-range: 3.0
  cooldown: 1.0

# Prologue system configuration
prologue:
  interaction-id: "prologue"
  npc-id: 69
  world: "story_sky"
  npc-hologram-default: "§8§l????"
  npc-hologram-exclamation: "§b§l!"

# Plugin command integration
plugins:
  multiverse-teleport-command: "mvtp"
  sudo-command: "sudo"

# Web Panel — https://story.naturalsmp.net
webpanel:
  enabled: true
  port: 25809
  # URL publik (untuk /ni connect dan CORS)
  public-url: "https://story.naturalsmp.net"
  # Token expire dalam detik (default 8 jam)
  token-expire-seconds: 28800

# MySQL — hanya perlu dikonfigurasi di sini, web panel pakai API dari plugin
mysql:
  enabled: false
  host: "103.93.129.117"
  port: 3306
  database: "naturalsmp_interaction"
  username: "root"
  password: "changeme"
  # HikariCP pool settings
  pool-size: 5
  connection-timeout: 30000
