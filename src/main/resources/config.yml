# NaturalInteraction v2 Configuration

settings:
  debug: false

interaction:
  default-range: 3.0
  cooldown: 1.0

# Prologue system configuration
prologue:
  interaction-id: "prologue"
  npc-id: 69
  world: "story_sky"
  npc-hologram-default: "§8§l????"
  npc-hologram-exclamation: "§b§l!"

# Plugin command integration
plugins:
  multiverse-teleport-command: "mvtp"
  sudo-command: "sudo"

# Web Panel — https://story.naturalsmp.net
webpanel:
  enabled: true
  port: 25809
  # URL publik website (untuk /ni connect link)
  public-url: "https://story.naturalsmp.net"
  # URL API backend (plugin HTTP server, diakses dari browser admin)
  # Kosongkan untuk auto-detect sebagai http://localhost:<port>
  # Jika pakai Cloudflare Tunnel: "https://api-story.naturalsmp.net"
  # Jika direct: "http://furina.nexuscloud.id:25809"
  api-url: "http://furina.nexuscloud.id:25809"
  # Token expire dalam detik (default 30 menit)
  token-expire-seconds: 1800
